name: Build Release APK

on:
  push:
    tags: [ "v*" ]
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Sign release APK
        id: sign
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          set -e
          UNSIGNED_APK=$(find app/build/outputs/apk/release -maxdepth 2 -name '*.apk' | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No release APK found." >&2
            exit 1
          fi

          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "unversioned")
          OUT_NAME="OppoPods-${VERSION_NAME}-release.apk"

          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -1)

          if [ -n "$SIGNING_KEY" ]; then
            echo "$SIGNING_KEY" | base64 -d > /tmp/keystore.jks
            "${BUILD_TOOLS}zipalign" -f 4 "$UNSIGNED_APK" "./$OUT_NAME"
            "${BUILD_TOOLS}apksigner" sign \
              --ks /tmp/keystore.jks \
              --ks-key-alias "${{ secrets.ALIAS }}" \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              "./$OUT_NAME"
            rm /tmp/keystore.jks
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            # No signing key: upload the gradle-produced APK as-is (may be unsigned)
            cp "$UNSIGNED_APK" "./$OUT_NAME"
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "apk=$OUT_NAME" >> "$GITHUB_OUTPUT"

      # Non-zipped artifact upload — GitHub Actions 2026-02 feature
      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.sign.outputs.apk }}
          path: ./${{ steps.sign.outputs.apk }}
          archive: false
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') && steps.sign.outputs.signed == 'true' }}
        uses: ncipollo/release-action@v1
        with:
          token: ${{ github.token }}
          artifacts: "./${{ steps.sign.outputs.apk }}"
          generateReleaseNotes: true
          makeLatest: true
